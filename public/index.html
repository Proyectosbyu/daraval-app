<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarAval — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:  #00c853;
    --accent2: #2979ff;
    --danger:  #ff3d00;
    --gold:    #ffab00;
    --border:  #e0e0e0;
    --muted:   #6b7280;
    --card:    #ffffff;
    --surface: #f5f5f5;
    --text:    #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .login-wrap { width: 100%; max-width: 400px; }

  .brand { text-align: center; margin-bottom: 2.5rem; }

  .brand-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    letter-spacing: -0.5px;
    line-height: 1;
    color: #1a1a1a;
  }
  .brand-logo span { color: var(--accent); }

  .brand-tagline {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .login-card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  .login-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
    color: #1a1a1a;
  }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }

  label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input {
    background: #f9f9f9;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.65rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,200,83,0.12);
    background: #ffffff;
  }
  input::placeholder { color: #b0b0b0; }

  .btn-login {
    width: 100%;
    padding: 0.75rem;
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 0.25rem;
  }
  .btn-login:hover  { background: #00b84a; }
  .btn-login:active { background: #00a542; }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: rgba(255,61,0,0.06);
    border: 1px solid rgba(255,61,0,0.3);
    color: var(--danger);
    padding: 0.6rem 0.85rem;
    border-radius: 4px;
    font-size: 0.83rem;
    margin-bottom: 1rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .footer-note {
    text-align: center;
    margin-top: 1.75rem;
    font-size: 0.73rem;
    color: #9ca3af;
    letter-spacing: 0.05em;
  }

  .accent-line {
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 0.75rem auto 0;
    border-radius: 1px;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">Dar<span>Aval</span></div>
    <div class="accent-line"></div>
    <div class="brand-tagline">Gestión Comercial</div>
  </div>

  <div class="login-card">
    <div class="login-title">Iniciar sesión</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@daraval.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Ingresar →</button>
  </div>

  <div class="footer-note">DarAval Garantías · Sistema de Gestión Comercial</div>
</div>

<script>
  const existingToken = localStorage.getItem('fl_token');
  if (existingToken) {
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + existingToken } })
      .then(r => { if (r.ok) window.location.href = '/app'; })
      .catch(() => {});
  }

  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('errorMsg');

    errEl.classList.remove('show');
    if (!email || !password) { showError('Completá email y contraseña.'); return; }

    btn.disabled = true;
    btn.textContent = 'Verificando…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Error al iniciar sesión.'); return; }

      localStorage.setItem('fl_token', data.token);
      localStorage.setItem('fl_user', JSON.stringify(data.user));
      window.location.href = '/app';
    } catch {
      showError('No se pudo conectar al servidor.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Ingresar →';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
